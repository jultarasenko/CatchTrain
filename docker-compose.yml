services:
  uz-ticket-watcher:
    build: .
    container_name: uz_ticket_watcher
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data

  watchdog:
    build:
      context: .
      dockerfile: watchdog/Dockerfile
    container_name: uz_watchdog
    restart: unless-stopped
    env_file:
      - .env
